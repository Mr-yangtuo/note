  <h1>第二节：酶学基础</h1>
  <p>酶是生物催化剂，具有高效性和专一性。</p>

  <h2>一、酶的分类</h2>
  <ol>
    <li>氧化还原酶</li>
    <li>转移酶</li>
    <li>水解酶</li>
    <li>裂合酶</li>
    <li>异构酶</li>
    <li>连接酶</li>
  </ol>

  <h2>二、米氏方程</h2>
  <p>V = V<sub>max</sub> × [S] / (K<sub>m</sub> + [S])</p>

  <h2>三、影响酶活性的因素</h2>
  <ul>
    <li>温度</li>
    <li>pH</li>
    <li>底物浓度</li>
    <li>抑制剂</li>
  </ul>
</body>
